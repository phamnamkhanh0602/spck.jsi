<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<div class="sidebar">

<h2>🌤</h2>

<ul>
<li class="active">Weather</li>
</ul>

<button id="logoutBtn">Logout</button>

</div>


<div class="main">

<div class="search-bar">

<input id="cityInput" placeholder="Search city">

<button id="btnSearch">Search</button>

</div>

<div class="weather-card">

<div class="weather-info">

<h1 id="city">City</h1>

<h2 id="temp">--°C</h2>

<p id="desc">Weather</p>

</div>

<img id="icon" class="weather-icon">

</div>

<div class="weather-details">

<div class="detail-card">
<p>Humidity</p>
<h3 id="humidity"></h3>
</div>

<div class="detail-card">
<p>Wind</p>
<h3 id="wind"></h3>
</div>

</div>

<script type="module" src="weather.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
